global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "official-node-exporter"
    static_configs:
      - targets:
          - "node-exporter:9100"

  - job_name: "host-node-exporter"
    static_configs:
      - targets:
          - "host.docker.internal:9102"

  - job_name: "custom-fastapi-exporter"
    static_configs:
      - targets:
          - "host.docker.internal:9101"
